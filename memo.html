<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>방명록</title>
    <style>
        /* 전체 페이지의 스타일을 지정하고 배경 이미지 추가 */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            min-height: 100vh; /* 페이지 높이를 전체 화면 높이로 설정 */
            margin: 0;
            background-image: url('./myImg/img1.jpg'); /* 배경 이미지 URL을 넣으세요 */
            background-size: cover; /* 배경 이미지 크기를 컨테이너 크기에 맞춤 */
            background-position: center; /* 배경 이미지의 위치를 가운데로 설정 */
            background-repeat: no-repeat; /* 배경 이미지 반복하지 않음 */
        }

        /* 방명록 제목의 컨테이너에 배경 색상 추가 */
        .header {
            background-color: #49817A; /* 연한 분홍색 배경 (투명도 80%) */
            width: 100%;
            padding: 20px 0;
            text-align: center; /* 텍스트 가운데 정렬 */
        }

        /* 방명록 제목의 색상을 분홍색으로 지정 */
        h1 {
            color: white; /* 텍스트 색상 */
            margin: 0; /* 여백 제거 */
        }

        /* 메시지 입력창의 크기를 조절 */
        #message {
            width: 300px;
            height: 100px;
            background-color: #FFF6FB; /* 아이보리색 배경 */
        }

        /* 이름 입력창의 크기를 조절 */
        #name {
            width: 200px;
            background-color: #FFF6FB; /* 아이보리색 배경 */
        }

        /* 게시된 방명록 글의 스타일 지정 */
        .guestbook-entry {
            background-color: #D8BFD8; /* 진한 핑크 색상 */
            color: white;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 5px;
            width: 100%;
            box-sizing: border-box;
        }

        /* 게시된 방명록 글의 시간 스타일 지정 */
        .guestbook-time {
            font-size: smaller;
            color: lightgrey;
        }

        /* 방명록 폼과 항목 컨테이너의 스타일 지정 */
        .container {
            width: 80%;
            max-width: 600px;
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>방명록</h1>
        </div>

        <div id="guestbook-entries">
            <!-- 방명록 항목이 여기에 표시됩니다. -->
        </div>

        <form id="guestbook-form">
            <label for="name">이름:</label><br>
            <input type="text" id="name" name="name"><br>
            <label for="message">메시지:</label><br>
            <textarea id="message" name="message"></textarea><br>
            <input type="submit" value="제출">
        </form>
    </div>

    <script>
        // 폼 제출 시 방명록 항목 추가
        document.getElementById("guestbook-form").addEventListener("submit", function(event) {
            event.preventDefault(); // 기본 제출 동작 방지

            // 입력된 이름과 메시지 가져오기
            var name = document.getElementById("name").value;
            var message = document.getElementById("message").value;

            // 현재 시간 가져오기
            var now = new Date();
            var time = now.toLocaleString();

            // 새로운 방명록 항목 생성
            var entry = document.createElement("div");
            entry.classList.add("guestbook-entry"); // CSS 클래스 추가
            entry.innerHTML = "<strong>" + name + ":</strong> " + message + "<br>" +
                              "<span class='guestbook-time'>" + time + "</span>";

            // 방명록 목록에 추가
            var guestbook = document.getElementById("guestbook-entries");
            guestbook.insertBefore(entry, guestbook.firstChild); // 입력 폼 위에 추가

            // 입력 필드 초기화
            document.getElementById("name").value = "";
            document.getElementById("message").value = "";
        });
    </script>
</body>
</html>
